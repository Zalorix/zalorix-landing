<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.42"/>
      <stop offset="0.7" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.40"/>
      <stop offset="0.72" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1640" height="624" fill="url(#bg)"/>
  <rect x="1120" y="-180" width="760" height="760" fill="url(#glowA)"/>
  <rect x="-260" y="220" width="720" height="720" fill="url(#glowB)"/>

  <!-- centered composition -->
  <!-- R badge: favicon mark scaled 1.5x, placed at (745,96) -->
  <g transform="translate(745,96) scale(1.5)">
    <rect width="100" height="100" rx="22" fill="#4F46E5"/>
    <rect x="30.5" y="19.5" width="11" height="11" fill="#FFFFFF"/>
    <rect x="30.5" y="45.5" width="11" height="11" fill="#FFFFFF"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="butt" stroke-linejoin="round" stroke-dasharray="18 7">
      <path d="M36 25 V75"/>
      <path d="M36 25 H50 a13 13 0 0 1 0 26 H36"/>
    </g>
    <path d="M50 51 L70 75" fill="none" stroke="#A5B4FC" stroke-width="11" stroke-linecap="butt" stroke-dasharray="18 7"/>
  </g>

  <!-- wordmark -->
  <text x="820" y="350" text-anchor="middle"
    font-family="'Space Grotesk', 'Inter', sans-serif" font-size="96" font-weight="600"
    letter-spacing="-1.9" fill="#FFFFFF">Rozalix</text>

  <!-- tagline -->
  <text x="820" y="418" text-anchor="middle"
    font-family="'Inter', sans-serif" font-size="33" font-weight="500"
    letter-spacing="-0.3" fill="#E2E8F0">Websites that turn visitors into customers.</text>

  <!-- divider -->
  <rect x="710" y="455" width="220" height="2" rx="1" fill="#FFFFFF" opacity="0.14"/>

  <!-- subline -->
  <text x="820" y="500" text-anchor="middle"
    font-family="'Inter', sans-serif" font-size="22" font-weight="500"
    letter-spacing="2.4" fill="#A5B4FC">WEB DESIGN &amp; DEVELOPMENT</text>
</svg>
